services:
  jbhub:
    image: ${JBHUB_RUNTIME_IMAGE:-jbhub-finance:finance-runtime}
    container_name: jbhub-finance
    restart: unless-stopped
    ports:
      - "${JBHUB_RUNTIME_PORT:-3031}:${JBHUB_RUNTIME_PORT:-3031}"
    environment:
      API_PORT: "${JBHUB_RUNTIME_PORT:-3031}"
      SERVE_STATIC_DIST: "1"
      CORS_ALLOWED_ORIGINS: "http://127.0.0.1:${JBHUB_RUNTIME_PORT:-3031},http://localhost:${JBHUB_RUNTIME_PORT:-3031}"
      DOCKER_PREVIEW_HOST: "host.docker.internal"
      API_JWT_HS256_SECRET: "change-this-secret-before-prod"
      ADMIN_DEFAULT_USERNAME: "admin"
      ADMIN_DEFAULT_PASSWORD: "change-this-password"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./jbhub-storage:/app/.runtime/storage
      - /var/run/docker.sock:/var/run/docker.sock
