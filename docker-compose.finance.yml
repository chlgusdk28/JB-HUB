services:
  jbhub:
    image: ${JBHUB_RUNTIME_IMAGE:-jbhub-finance:finance-runtime}
    container_name: jbhub-finance
    restart: unless-stopped
    ports:
      - "${JBHUB_RUNTIME_PORT:-3031}:${JBHUB_RUNTIME_PORT:-3031}"
    environment:
      API_PORT: "${JBHUB_RUNTIME_PORT:-3031}"
      SERVE_STATIC_DIST: "1"
      CORS_ALLOWED_ORIGINS: "http://127.0.0.1:${JBHUB_RUNTIME_PORT:-3031},http://localhost:${JBHUB_RUNTIME_PORT:-3031}"
      DOCKER_PREVIEW_HOST: "host.docker.internal"
      API_JWT_HS256_SECRET: "change-this-secret-before-prod"
      ADMIN_DEFAULT_USERNAME: "admin"
      ADMIN_DEFAULT_PASSWORD: "change-this-password"
      AIRGAP_BUILD_EXECUTOR_MODE: "${AIRGAP_BUILD_EXECUTOR_MODE:-mock}"
      AIRGAP_SCAN_MODE: "${AIRGAP_SCAN_MODE:-mock}"
      AIRGAP_BUILD_TIMEOUT_MS: "${AIRGAP_BUILD_TIMEOUT_MS:-1800000}"
      AIRGAP_SCAN_TIMEOUT_MS: "${AIRGAP_SCAN_TIMEOUT_MS:-600000}"
      AIRGAP_INTERNAL_REGISTRY: "${AIRGAP_INTERNAL_REGISTRY:-}"
      AIRGAP_INTERNAL_REGISTRY_MIRROR: "${AIRGAP_INTERNAL_REGISTRY_MIRROR:-}"
      AIRGAP_BUILD_EXECUTOR_COMMAND: "${AIRGAP_BUILD_EXECUTOR_COMMAND:-}"
      AIRGAP_PUSH_COMMAND: "${AIRGAP_PUSH_COMMAND:-}"
      AIRGAP_SCAN_COMMAND: "${AIRGAP_SCAN_COMMAND:-}"
      AIRGAP_INSPECT_COMMAND: "${AIRGAP_INSPECT_COMMAND:-}"
      AIRGAP_KANIKO_RUNTIME_BIN: "${AIRGAP_KANIKO_RUNTIME_BIN:-docker}"
      AIRGAP_KANIKO_IMAGE: "${AIRGAP_KANIKO_IMAGE:-registry.internal.bank.co.kr/build/kaniko-executor:latest}"
      AIRGAP_KANIKO_DOCKER_CONFIG_DIR: "${AIRGAP_KANIKO_DOCKER_CONFIG_DIR:-}"
      AIRGAP_KANIKO_CACHE_REPO: "${AIRGAP_KANIKO_CACHE_REPO:-}"
      AIRGAP_KANIKO_ADDITIONAL_ARGS: "${AIRGAP_KANIKO_ADDITIONAL_ARGS:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./jbhub-storage:/app/.runtime/storage
      - /var/run/docker.sock:/var/run/docker.sock
