name: Smoke

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Start MySQL
        run: docker compose up -d mysql

      - name: Wait for MySQL health
        run: |
          for i in {1..60}; do
            status=$(docker inspect --format='{{json .State.Health.Status}}' jbhub-mysql 2>/dev/null || true)
            if [ "$status" = "\"healthy\"" ]; then
              echo "MySQL is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become healthy in time."
          docker compose logs mysql || true
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Run full smoke suite
        run: npm run smoke

      - name: Docker state (always)
        if: always()
        run: |
          docker compose ps || true
          docker compose logs --no-color mysql || true

      - name: Cleanup containers (always)
        if: always()
        run: docker compose down -v --remove-orphans
