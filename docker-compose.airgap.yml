services:
  mysql:
    image: ${JBHUB_MYSQL_IMAGE:-mysql:8.4}
    container_name: ${JBHUB_STACK_NAME:-jbhub}-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jbhub}
      MYSQL_USER: ${MYSQL_USER:-jbhub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jbhub}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "${JBHUB_DB_PORT:-3310}:3306"
    volumes:
      - jbhub_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    image: ${JBHUB_API_IMAGE:-jbhub-api:airgap}
    container_name: ${JBHUB_STACK_NAME:-jbhub}-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      API_PORT: 8787
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-jbhub}
      DB_PASSWORD: ${MYSQL_PASSWORD:-jbhub}
      DB_NAME: ${MYSQL_DATABASE:-jbhub}
      DB_CONN_LIMIT: ${DB_CONN_LIMIT:-10}
      DB_SEED: ${DB_SEED:-true}
      DB_CONNECT_RETRY_ATTEMPTS: ${DB_CONNECT_RETRY_ATTEMPTS:-40}
      DB_CONNECT_RETRY_DELAY_MS: ${DB_CONNECT_RETRY_DELAY_MS:-2000}
      APP_PRODUCT_MODE: ${APP_PRODUCT_MODE:-signup}
      API_RATE_LIMIT_WINDOW_MS: ${API_RATE_LIMIT_WINDOW_MS:-60000}
      API_RATE_LIMIT_MAX_REQUESTS: ${API_RATE_LIMIT_MAX_REQUESTS:-240}
      API_JWT_HS256_SECRET: ${API_JWT_HS256_SECRET:?API_JWT_HS256_SECRET is required}
      API_JWT_ISSUER: ${API_JWT_ISSUER:-jbhub-api}
      API_JWT_AUDIENCE: ${API_JWT_AUDIENCE:-jbhub-client}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-86400}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-604800}
      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:?ADMIN_DEFAULT_PASSWORD is required}
      ADMIN_DEFAULT_EMAIL: ${ADMIN_DEFAULT_EMAIL:-admin@jbhub.local}
      ADMIN_SESSION_TIMEOUT_MS: ${ADMIN_SESSION_TIMEOUT_MS:-3600000}
      ADMIN_MAX_LOGIN_ATTEMPTS: ${ADMIN_MAX_LOGIN_ATTEMPTS:-5}
      ADMIN_LOCKOUT_DURATION_MS: ${ADMIN_LOCKOUT_DURATION_MS:-900000}
      AUTH_STATE_CLEANUP_INTERVAL_MS: ${AUTH_STATE_CLEANUP_INTERVAL_MS:-300000}
      AUDIT_LOG_ENABLED: ${AUDIT_LOG_ENABLED:-true}
      AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-90}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "${JBHUB_API_PORT:-8787}:8787"
    volumes:
      - jbhub_project_files:/app/project-files
      - jbhub_docker_uploads:/app/docker-uploads
      - jbhub_docker_temp:/app/docker-temp
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/v1/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    image: ${JBHUB_WEB_IMAGE:-jbhub-web:airgap}
    container_name: ${JBHUB_STACK_NAME:-jbhub}-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${JBHUB_WEB_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  adminer:
    image: ${JBHUB_ADMINER_IMAGE:-adminer:4}
    container_name: ${JBHUB_STACK_NAME:-jbhub}-adminer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    profiles: ["ops"]
    ports:
      - "${JBHUB_ADMINER_PORT:-8081}:8080"

volumes:
  jbhub_mysql_data:
  jbhub_project_files:
  jbhub_docker_uploads:
  jbhub_docker_temp:
